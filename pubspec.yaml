name: doc_scanner
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0 
  provider: ^6.1.2
  camera: ^0.12.0+1
  device_info_plus: ^12.4.0
  image: ^4.1.3
  permission_handler: ^12.0.1
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.2
  google_mlkit_translation: ^0.13.1
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  printing: ^5.14.3
  pdf: ^3.11.3
  media_store_plus: ^0.1.3
  connectivity_plus: ^6.1.4
  internet_connection_checker: ^3.0.1
  file_picker: ^10.1.9
  http: ^1.6.0
  share_plus: ^12.0.2
  syncfusion_flutter_pdf: ^33.2.6
  shared_preferences: ^2.5.5
  flutter_screenutil: ^5.9.3
  syncfusion_flutter_pdfviewer: ^33.2.6
  google_mlkit_document_scanner: ^0.4.1
  google_fonts: ^6.2.1
  colorfilter_generator: ^0.0.8
  lottie: ^3.3.3
  url_launcher: ^6.3.2
  google_mobile_ads: ^9.0.0
  firebase_core: ^4.10.0
  firebase_remote_config: ^6.0.0
  in_app_purchase_android: ^0.5.0
  in_app_purchase: ^3.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/photo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/photo.png
  remove_alpha_ios: true
  background_color_ios: "#000000"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/home/
    - assets/chatbot/
    - assets/language/
    - assets/onboarding/
    - assets/settings/
    - assets/fonts/
    - assets/first.json
    - assets/second.json
    - assets/third.json
    - assets/fourth.json
    - assets/pen.json
    - assets/in_app_animation.json
    - assets/pro_animation.json

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf